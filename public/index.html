<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Codex</title>
  <link rel="stylesheet" href="/style.css?v=64">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="login-view" class="view">
      <div class="login-card">
        <h1> Remote Codex</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          <div id="login-message" class="message"></div>
          <button type="submit" id="login-btn">Login</button>
        </form>
      </div>
    </div>

    <div id="main-view" class="view no-session" style="display: none;">
      <header>
        <div class="nav-tabs" role="tablist" aria-label="Main views">
          <button id="sessions-tab" class="nav-tab active" type="button">Sessions</button>
          <button id="conversation-tab" class="nav-tab" type="button">Conversation</button>
        </div>
        <button id="logout-btn" aria-label="Logout">×</button>
      </header>

      <div class="container">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>Sessions</h2>
            <button id="new-session-btn">+ New</button>
          </div>
          <ul id="session-list" class="session-list"></ul>
        </aside>

        <main class="chat-area">
          <div id="chat-header" class="chat-header">
            <button id="toggle-sidebar" class="icon-btn" aria-pressed="false" aria-label="Toggle fullscreen">⛶</button>
            <h2 id="session-title">Select or create a session</h2>
          </div>
          <div id="messages" class="messages">
            <div id="conversation-empty-state" class="conversation-empty-state">
              <button id="select-session-btn" type="button">Select Session</button>
            </div>
          </div>
          <div class="input-area">
            <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
            <div class="input-actions">
              <button id="send-btn">Send</button>
              <button id="interrupt-btn" style="display: none;">Stop</button>
            </div>
          </div>
        </main>
      </div>

      <div id="new-session-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
          <div class="modal-header">
            <h2>New Session</h2>
            <button id="close-new-session-modal" class="icon-btn" aria-label="Close">×</button>
          </div>
          <div class="modal-field">
            <label for="assistant-select">Assistant</label>
            <select id="assistant-select">
              <option value="codex">Codex</option>
              <option value="claude">Claude</option>
            </select>
          </div>
          <div class="modal-field">
            <label for="session-name-input">Session Name</label>
            <input id="session-name-input" type="text" placeholder="New Conversation">
          </div>
          <div class="modal-field">
            <label for="project-dir-input">Project Directory</label>
            <input id="project-dir-input" type="text" value="/root/remote_codex" placeholder="/path/to/project">
          </div>
          <div class="modal-actions">
            <button id="cancel-new-session-btn" type="button">Cancel</button>
            <button id="create-session-btn" type="button">Create</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js?v=66"></script>
</body>
</html>
