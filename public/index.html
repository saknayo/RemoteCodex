<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Codex</title>
  <link rel="stylesheet" href="/style.css?v=28">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="app">
    <div id="login-view" class="view">
      <div class="login-card">
        <h1> Remote Codex</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          <div id="login-message" class="message"></div>
          <button type="submit" id="login-btn">Login</button>
        </form>
      </div>
    </div>

    <div id="main-view" class="view" style="display: none;">
      <header>
        <h1> Remote Codex</h1>
        <button id="logout-btn">Logout</button>
      </header>

      <div class="container">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>Sessions</h2>
            <button id="new-session-btn">+ New</button>
          </div>
          <ul id="session-list" class="session-list"></ul>
        </aside>

        <main class="chat-area">
          <div id="chat-header" class="chat-header">
            <button id="toggle-sidebar" class="icon-btn" style="padding: 0.5rem; margin-right: 0.5rem; display: none;">☰</button>
            <h2 id="session-title">Select or create a session</h2>
          </div>
          <div id="messages" class="messages"></div>
          <div class="input-area">
            <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
            <div class="input-actions">
              <button id="send-btn">Send</button>
              <button id="interrupt-btn" style="display: none;">Stop</button>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="/app.js?v=28"></script>
</body>
</html>
